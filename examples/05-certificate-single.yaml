# Example Certificate resource for a single domain
# This will request a certificate for www.example.com only

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: www-example-com
  namespace: default
spec:
  secretName: www-example-com-tls
  renewBefore: 720h
  issuerRef:
    name: letsencrypt-huawei-prod
    kind: ClusterIssuer
  dnsNames:
  - www.example.com
