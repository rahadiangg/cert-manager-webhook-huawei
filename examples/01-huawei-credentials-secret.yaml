# Huawei Cloud DNS Credentials Secret
# Replace with your actual Huawei Cloud Access Key (AK) and Secret Key (SK)

apiVersion: v1
kind: Secret
metadata:
  name: huawei-cloud-credentials
  namespace: cert-manager
type: Opaque
stringData:
  # Get these from Huawei Cloud IAM → Users → Create User (Programmatic Access)
  access-key-id: "xxxxxxxxx"
  secret-access-key: "xxxxxxxx"
